name: CICD for Portfolio

on:
  push:
    branches:
      - main  # Jab aap main branch par push karenge

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Project folder mein jana (Jo aapke screenshot mein tha)
            cd ~/devops-portfolio
            
            # Latest code GitHub se lena
            git pull origin main
            
            # Purana container saaf karna taaki port conflict na ho
            sudo docker stop portfolio-container || true
            sudo docker rm portfolio-container || true
            
            # Nayi image build karna
            sudo docker build -t portfolio .
            
            # Naya container start karna
            sudo docker run -d -p 80:80 --name portfolio-container portfolio